name: PyPI Publish
on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+
jobs:
  build_and_publish_vastai:
    name: Publish vastai
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # important for git history with dynamic versioning
      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install poetry and plugins
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          poetry self add "poetry-dynamic-versioning[plugin]"
      - name: install dependencies
        run: poetry install --no-interaction --no-root
      - name: build and publish vastai to PyPI
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          poetry config pypi-token.pypi "$PYPI_API_TOKEN"
          poetry publish --build

  build_and_publish_vastai_sdk:
    name: Publish vastai-sdk
    needs: build_and_publish_vastai
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install poetry and plugins
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          poetry self add "poetry-dynamic-versioning[plugin]"
      - name: pin vastai dependency to this release version
        working-directory: sdk-wrapper
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/vastai = \">=0.1.0\"/vastai = \"==${VERSION}\"/" pyproject.toml
      - name: build and publish vastai-sdk to PyPI
        env:
          PYPI_API_TOKEN_SDK: ${{ secrets.PYPI_API_TOKEN_SDK }}
        working-directory: sdk-wrapper
        run: |
          poetry config pypi-token.pypi "$PYPI_API_TOKEN_SDK"
          poetry publish --build
